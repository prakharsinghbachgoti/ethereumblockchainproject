name: Daily ETH Metrics

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch: {}

jobs:
  run-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5   #  Updated for Node 24 runtime

      - name: Setup Python
        uses: actions/setup-python@v6 #  Updated for Node 24 runtime
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas google-cloud-bigquery db-dtypes pyarrow jupyter nbconvert

      - name: Write GCP credentials
        run: echo '${{ secrets.MYSECRETJSONKEY }}' > service_client.json

      - name: Convert notebook to script
        run: jupyter nbconvert --to script google_cloud_connection.ipynb

      - name: Run script
        run: python google_cloud_connection.py

      - name: Commit updated CSV back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/eth_daily_metrics.csv
          git diff --cached --quiet || git commit -m "Update daily ETH metrics"
          git push
